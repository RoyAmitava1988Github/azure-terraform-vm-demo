trigger:
  branches:
    include:
      - main

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  terraformVersion: '1.9.8'
  workingDirectory: 'env/dev'
  serviceConnection: 'sc-identity-federation'

stages:
- stage: Validate
  displayName: 'Terraform Validate'
  jobs:
  - job: Validate
    displayName: 'Validate Terraform'
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: '$(terraformVersion)'

    - task: AzureCLI@2
      displayName: 'Terraform Init and Validate'
      inputs:
        azureSubscription: '$(serviceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -e
          cd $(workingDirectory)
          terraform init -backend-config=backend.hcl
          terraform fmt -check -recursive
          terraform validate

- stage: Plan
  displayName: 'Terraform Plan'
  dependsOn: Validate
  jobs:
  - job: Plan
    displayName: 'Plan Terraform'
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: '$(terraformVersion)'

    - task: AzureCLI@2
      displayName: 'Terraform Plan'
      inputs:
        azureSubscription: '$(serviceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -e
          cd $(workingDirectory)
          terraform init -backend-config=backend.hcl
          terraform plan -var-file=terraform.tfvars -out=tfplan

    - task: PublishPipelineArtifact@1
      displayName: 'Publish tfplan'
      inputs:
        targetPath: '$(workingDirectory)/tfplan'
        artifact: 'tfplan'
        publishLocation: 'pipeline'

- stage: Apply
  displayName: 'Terraform Apply'
  dependsOn: Plan
  condition: succeeded()
  jobs:
  - deployment: ApplyDeployment
    displayName: 'Apply Terraform'
    environment: 'dev-azure-apply'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: '$(terraformVersion)'

          - download: current
            artifact: tfplan

          - task: AzureCLI@2
            displayName: 'Terraform Apply'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                cd $(workingDirectory)
                terraform init -backend-config=backend.hcl
                cp $(Pipeline.Workspace)/tfplan/tfplan ./tfplan
                terraform apply -auto-approve tfplan