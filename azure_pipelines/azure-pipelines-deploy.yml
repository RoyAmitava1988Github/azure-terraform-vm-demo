trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: "1.9.8"
  workingDirectory: "envs/dev"
  serviceConnection: "sc-identity-federation"

stages:
- stage: Validate
  displayName: "Terraform Validate"
  jobs:
  - job: Validate
    displayName: "Validate Terraform"
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: "Terraform fmt and validate"
      inputs:
        azureSubscription: "$(serviceConnection)"
        addSpnToEnvironment: true
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          install_terraform() {
            if command -v terraform >/dev/null 2>&1 && terraform version | grep -q "Terraform v$(terraformVersion)"; then
              return
            fi

            curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip"
            unzip -o terraform.zip
            sudo mv terraform /usr/local/bin/terraform
            rm -f terraform.zip
          }

          export ARM_CLIENT_ID="$servicePrincipalId"
          export ARM_TENANT_ID="$tenantId"
          export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          export ARM_USE_OIDC=true
          export ARM_OIDC_TOKEN="$idToken"

          install_terraform
          terraform version
          terraform fmt -check -recursive

          cd "$(workingDirectory)"
          terraform init -input=false
          terraform validate

- stage: Plan
  displayName: "Terraform Plan"
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: Plan
    displayName: "Create Terraform plan"
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: "Terraform plan"
      env:
        PIPELINE_SSH_PUBLIC_KEY: "$(sshPublicKey)"
        PIPELINE_ALLOWED_SSH_SOURCE_IP: "$(allowedSshSourceIp)"
      inputs:
        azureSubscription: "$(serviceConnection)"
        addSpnToEnvironment: true
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          install_terraform() {
            if command -v terraform >/dev/null 2>&1 && terraform version | grep -q "Terraform v$(terraformVersion)"; then
              return
            fi

            curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip"
            unzip -o terraform.zip
            sudo mv terraform /usr/local/bin/terraform
            rm -f terraform.zip
          }

          export ARM_CLIENT_ID="$servicePrincipalId"
          export ARM_TENANT_ID="$tenantId"
          export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          export ARM_USE_OIDC=true
          export ARM_OIDC_TOKEN="$idToken"

          validate_pipeline_variables() {
            if [ -z "${PIPELINE_SSH_PUBLIC_KEY:-}" ] || [[ "$PIPELINE_SSH_PUBLIC_KEY" == *'$('* ]] || [ "$PIPELINE_SSH_PUBLIC_KEY" = "PASTE-YOUR-SSH-PUBLIC-KEY-HERE" ]; then
              echo "##vso[task.logissue type=error]Set Azure DevOps pipeline variable sshPublicKey to your real OpenSSH public key."
              exit 1
            fi

            if [ -z "${PIPELINE_ALLOWED_SSH_SOURCE_IP:-}" ] || [[ "$PIPELINE_ALLOWED_SSH_SOURCE_IP" == *'$('* ]] || [ "$PIPELINE_ALLOWED_SSH_SOURCE_IP" = "YOUR_PUBLIC_IP/32" ]; then
              echo "##vso[task.logissue type=error]Set Azure DevOps pipeline variable allowedSshSourceIp to your public IP in CIDR format, for example 203.0.113.10/32."
              exit 1
            fi
          }

          install_terraform
          validate_pipeline_variables
          terraform version

          cd "$(workingDirectory)"
          terraform init -input=false
          terraform plan \
            -input=false \
            -var-file=terraform.tfvars \
            -var="ssh_public_key=${PIPELINE_SSH_PUBLIC_KEY}" \
            -var="allowed_ssh_source_ip=${PIPELINE_ALLOWED_SSH_SOURCE_IP}" \
            -out=tfplan

    - task: PublishPipelineArtifact@1
      displayName: "Publish Terraform plan"
      inputs:
        targetPath: "$(workingDirectory)/tfplan"
        artifact: "tfplan"

- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Plan
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
  - deployment: Apply
    displayName: "Apply Terraform plan"
    environment: "dev-azure-apply"
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - download: current
            artifact: tfplan

          - task: AzureCLI@2
            displayName: "Terraform apply"
            inputs:
              azureSubscription: "$(serviceConnection)"
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                install_terraform() {
                  if command -v terraform >/dev/null 2>&1 && terraform version | grep -q "Terraform v$(terraformVersion)"; then
                    return
                  fi

                  curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip"
                  unzip -o terraform.zip
                  sudo mv terraform /usr/local/bin/terraform
                  rm -f terraform.zip
                }

                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN="$idToken"

                install_terraform
                terraform version

                cd "$(workingDirectory)"
                terraform init -input=false
                cp "$(Pipeline.Workspace)/tfplan/tfplan" ./tfplan
                terraform apply -input=false -auto-approve tfplan
